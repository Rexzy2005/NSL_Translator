plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.nsl_translate"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId = "com.example.nsl_translate"
        // MediaPipe Tasks Vision requires API 24+; Flutter's default minSdk
        // can be lower than that, so pin a safe floor here.
        minSdk = 24
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
        }
    }

    // MediaPipe reads the .task model files via mmap; AAPT must not
    // recompress them or the loader fails at runtime.
    aaptOptions {
        noCompress "tflite", "task"
    }
}

dependencies {
    // MediaPipe Tasks Vision — landmarker-only modules for pose, hand, face.
    // We assemble the 1662-float holistic feature vector in Dart-side logic.
    implementation 'com.google.mediapipe:tasks-vision:0.10.14'
}

kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
    }
}

flutter {
    source = "../.."
}
