name: nsl_translate
description: Offline-first Nigerian Sign Language translation mobile app.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.0
  google_sign_in: ^6.2.0
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  sqflite: ^2.3.0
  camera: ^0.10.5+9
  flutter_tts: ^4.0.2
  connectivity_plus: ^6.0.3
  provider: ^6.1.2
  http: ^1.2.0
  path_provider: ^2.1.2
  path: ^1.9.0
  intl: ^0.19.0
  uuid: ^4.3.3
  go_router: ^13.0.0
  permission_handler: ^11.3.1
  flutter_svg: ^2.0.10+1
  tflite_flutter: ^0.12.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/models/
